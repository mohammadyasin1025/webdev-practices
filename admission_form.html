<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>AIUB UNIVERSITY ADMISSION FORM</title>
    </head>
    <body>
        <h2>University Admission Form</h2>
        <form action="#" method="post" enctype="multipart/form -data">
            <fieldset>
                <legend>Personal Information</legend>
                <label for="fullname" >Fullname:</label>
                <input type="text" id="fullname" name="fullname" required>
                <br>
                <label for="email"> Email Adress:</label>
                <input type="email" id="email" name="email" required>
                <br>
                <label for="dob">Date of birth:</label>
                <input type="date" id="dob" name="dob" required>
                <br>
                <label>gender:</label>
                <input type="radio" id="male" name="gender"  value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>
                <input type="radio" id="other" name="gender" value="other">
                <label for="other">other</label>

            </fieldset>
            <br>
            <fieldset>
                <legend>Academic Information and perference</legend>
                <label for="department">Preferred Department:</label>
            <select id="department" name="department" required>
                <option value="">-- Select a Department --</option>
                <option value="cs">Computer Science (CS)</option>
                <option value="eee">Electrical & Electronic Engineering (EEE)</option>
                <option value="bba">Business Administration (BBA)</option>
            </select>
            <br><br>

            <label>Areas of Interest:</label><br>
            <input type="checkbox" id="webtech" name="interests" value="webtech">
            <label for="webtech">Web Technologies</label><br>
            <input type="checkbox" id="ai" name="interests" value="ai">
            <label for="ai">Artificial Intelligence</label><br>
            <input type="checkbox" id="networking" name="interests" value="networking">
            <label for="networking">Computer Networking</label>
            <br><br>

            <label for="transcript">Upload Academic Transcript (PDF/Image):</label>
            <input type="file" id="transcript" name="transcript" required>
        </fieldset>

        <br><br>

        <button type="submit">Submit Application</button>
        <button type="reset">Reset Form</button>
            </fieldset>
        </form>
    </body>
</html>
